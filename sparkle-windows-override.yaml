# Sparkle / Mihomo Windows 远程 YAML 覆写
# 绑定到 Sparkle 的节点订阅或内置 Sub-Store ClashMeta 输出使用。
# 本文件接管 DNS、嗅探、策略组与分流规则；端口、系统代理、TUN 等由 Sparkle 界面管理。
# 不包含私人节点、订阅地址、密码或 Token，也不能作为普通订阅单独激活。

dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.arpa"
    - "time.*.com"
    - "ntp.*.com"
    - "localhost.ptlogin2.qq.com"
    - "*.msftncsi.com"
    - "www.msftconnecttest.com"
    - "+.ts.net"
    - "+.tailscale.com"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver-policy:
    "+.ts.net": system
    "+.tailscale.com": system
  respect-rules: false

sniffer:
  enable: true
  parse-pure-ip: true
  force-dns-mapping: true
  override-destination: false
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
    TLS:
      ports:
        - 443
    QUIC:
      ports:
        - 443
  skip-domain:
    - "+.lan"
    - "+.local"
    - "+.ts.net"
    - "+.tailscale.com"
  skip-dst-address:
    - 100.64.0.0/10
    - fd7a:115c:a1e0::/48

proxy-groups:
  - name: Auto
    type: url-test
    include-all: true
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 50
    lazy: true
    timeout: 5000
    max-failed-times: 3
    expected-status: 204

  - name: Proxy
    type: select
    proxies:
      - Auto
      - DIRECT
      - Hong Kong
      - Taiwan
      - Japan
      - Singapore
      - United States
    include-all: true

  - name: Spotify
    type: select
    proxies:
      - Proxy
      - DIRECT
      - Hong Kong
      - Taiwan
      - Japan
      - Singapore
      - United States
    include-all: true

  - name: Telegram
    type: select
    proxies:
      - Proxy
      - DIRECT
      - Hong Kong
      - Taiwan
      - Japan
      - Singapore
      - United States
    include-all: true

  - name: OpenAI
    type: select
    proxies:
      - Proxy
      - DIRECT
      - Hong Kong
      - Taiwan
      - Japan
      - Singapore
      - United States
    include-all: true

  - name: GitHub
    type: select
    proxies:
      - Proxy
      - DIRECT
      - Hong Kong
      - Taiwan
      - Japan
      - Singapore
      - United States
    include-all: true

  - name: Microsoft
    type: select
    proxies:
      - Proxy
      - DIRECT
      - Hong Kong
      - Taiwan
      - Japan
      - Singapore
      - United States
    include-all: true

  - name: Steam
    type: select
    proxies:
      - Proxy
      - DIRECT
      - Hong Kong
      - Taiwan
      - Japan
      - Singapore
      - United States
    include-all: true

  - name: Apple
    type: select
    proxies:
      - Proxy
      - DIRECT
      - Hong Kong
      - Taiwan
      - Japan
      - Singapore
      - United States
    include-all: true

  - name: YouTube
    type: select
    proxies:
      - Proxy
      - DIRECT
      - Hong Kong
      - Taiwan
      - Japan
      - Singapore
      - United States
    include-all: true

  - name: Hong Kong
    type: url-test
    include-all: true
    filter: '(?i)(香港|港|🇭🇰|\bHK\b|Hong[ -]?Kong)'
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 50
    lazy: true
    timeout: 5000
    max-failed-times: 3
    expected-status: 204

  - name: Taiwan
    type: url-test
    include-all: true
    filter: '(?i)(台湾|台灣|臺灣|台北|臺北|🇹🇼|\bTW\b|Taiwan|Taipei)'
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 50
    lazy: true
    timeout: 5000
    max-failed-times: 3
    expected-status: 204

  - name: Japan
    type: url-test
    include-all: true
    filter: '(?i)(日本|东京|東京|大阪|🇯🇵|\bJP\b|Japan|Tokyo|Osaka)'
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 50
    lazy: true
    timeout: 5000
    max-failed-times: 3
    expected-status: 204

  - name: Singapore
    type: url-test
    include-all: true
    filter: '(?i)(新加坡|狮城|獅城|🇸🇬|\bSG\b|Singapore)'
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 50
    lazy: true
    timeout: 5000
    max-failed-times: 3
    expected-status: 204

  - name: United States
    type: url-test
    include-all: true
    filter: '(?i)(美国|美國|🇺🇸|\bUS(?:A)?\b|United[ -]?States|America|Los[ -]?Angeles|San[ -]?Jose|Seattle|New[ -]?York)'
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 50
    lazy: true
    timeout: 5000
    max-failed-times: 3
    expected-status: 204

